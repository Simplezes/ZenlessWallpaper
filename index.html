<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="js/libs/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <!-- Component-based Styles -->
    <link rel="stylesheet" href="css/components/LoadingScreen.css">
    <link rel="stylesheet" href="css/components/Header.css">
    <link rel="stylesheet" href="css/components/Background.css">
    <link rel="stylesheet" href="css/components/Footer.css">
    <link rel="stylesheet" href="css/components/MediaPlayer.css">
    <link rel="stylesheet" href="css/components/Calendar.css">
    <link rel="stylesheet" href="css/components/Watch.css">
    <link rel="stylesheet" href="css/components/Settings.css">

    <link rel="preload" href="assets/characters.json" as="fetch" crossorigin="anonymous">
    <script>
        window.charactersFetch = fetch('assets/characters.json')
            .then(r => r.json())
            .catch(e => console.error("Early fetch error", e));
    </script>

</head>

<body>
    <div id="loader-container"></div>
    <div id="header-container"></div>
    <div id="background-container"></div>
    <div id="footer-container"></div>
    <div id="settings-root"></div>

    <script src="js/libs/bootstrap.bundle.min.js"></script>
    <script src="js/libs/anime.min.js"></script>

    <!-- Component-based Entry Point -->
    <script type="module" src="js/index.js"></script>

    <!-- Legacy / Re-organized scripts -->
    <script src="js/cmyk.js"></script>
    <script src="js/kinetic.js"></script>
    <script src="js/transition.js"></script>
    <script src="js/wallpaper.js"></script>
    <script src="js/taskbar.js"></script>
    <script src="js/pattern.js"></script>
</body>

</html>
