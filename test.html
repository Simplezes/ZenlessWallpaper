<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZZ Edit Avatar Precise UI</title>
    <style>
        :root {
            --bg-black: #080808;
            --header-mesh: #121212;
            --accent-red: #c41e10;
            --select-yellow: #f8d348;
            --active-green: #a4ff33;
            --panel-bg: #0d0d0d;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            color: white;
            image-rendering: pixelated;
            /* Ensures sharp edges for small pixel art */
        }

        .window {
            width: 760px;
            background-color: var(--bg-black);
            border-radius: 30px;
            padding: 6px;
            border: 2px solid #000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            position: relative;
        }

        /* --- THE TOPBAR --- */
        .header {
            position: relative;
            padding: 20px 25px;
            background-color: var(--header-mesh);
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 4px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 24px 24px 0 0;
            z-index: 2;
        }

        .title {
            font-size: 30px;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Precise Trapezoidal Close Button with Internal Check */
        .close-btn {
            width: 70px;
            height: 38px;
            background: var(--accent-red);
            clip-path: polygon(18% 0%, 82% 0%, 100% 40%, 100% 60%, 82% 100%, 18% 100%, 0% 50%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* Align elements to the bottom to precise position the check within the bar */
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            /* Ensure elements don't go outside the trapezoid */
        }

        /* Checkmark element precise placement for internal bar fit */
        .close-btn::after {
            content: "✕";
            color: black;
            font-size: 16px;
            /* Reduced size to better fit inside without antialiasing issues */
            font-weight: 900;

            /* Precise internal fit: 
               Use absolute positioning to center horizontally within the bottom 'bar' region. 
               The bottom padding can push it up slightly into the defined bar area.
               Based on the active avatar icon, the bar is roughly bottom 30%.
               The absolute position and bottom 2px place it precisely inside that.
               Left 50% and transform center it precisely without pixel clipping issues.
            */
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);

            width: 100%;
            text-align: center;
        }

        /* --- THE AREA BELOW TOPBAR (Shadow/Gradient Shelf) --- */
        .header-shelf {
            height: 30px;
            background: linear-gradient(to bottom, #000 0%, transparent 100%);
            position: absolute;
            width: 100%;
            left: 0;
            z-index: 1;
        }

        /* --- CONTENT PANEL --- */
        .content-panel {
            background-color: var(--panel-bg);
            margin: 0 10px 10px 10px;
            padding: 40px 30px;
            border-radius: 0 0 20px 20px;
            height: 360px;
            overflow-y: scroll;
            position: relative;
            background-image: linear-gradient(150deg, #0a0a0a 0%, #111 100%);
        }

        /* Custom Scrollbar (Vertical Track) */
        .content-panel::-webkit-scrollbar {
            width: 12px;
        }

        .content-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 20px 0;
        }

        .content-panel::-webkit-scrollbar-thumb {
            background: #444;
            border: 3px solid var(--panel-bg);
            border-radius: 10px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 20px 14px;
        }

        .slot {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #1a1a1a;
            border: 3px solid #2a2a2a;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .slot.selected {
            border: 5px solid var(--select-yellow);
            box-shadow: 0 0 15px rgba(248, 211, 72, 0.4);
        }

        .slot.active {
            border: 5px solid var(--active-green);
            background: linear-gradient(to bottom, #222 72%, #000 72%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .slot.active::after {
            content: "✔";
            color: var(--active-green);
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 3px;
        }

        .slot.locked {
            opacity: 0.35;
            background: #222;
        }

        /* --- FOOTER --- */
        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 25px;
        }

        .use-btn {
            background-color: white;
            color: black;
            border: none;
            padding: 10px 80px;
            border-radius: 40px;
            font-size: 24px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .btn-icon {
            background: black;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-style: normal;
            font-size: 14px;
        }

        .return-hint {
            color: #555;
            margin-top: 15px;
            font-size: 14px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .circle-key {
            width: 16px;
            height: 16px;
            border: 2px solid #555;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="window">
        <div class="header">
            <h1 class="title">Edit Avatar</h1>
            <div class="close-btn"></div>
        </div>

        <div class="header-shelf"></div>

        <div class="content-panel">
            <div class="avatar-grid">
                <div class="slot selected"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot active"></div>
                <div class="slot"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
                <div class="slot locked"></div>
            </div>
        </div>

        <div class="footer">
            <button class="use-btn">
                <span class="btn-icon">✕</span> Use
            </button>
            <div class="return-hint">
                <span class="circle-key"></span> Return
            </div>
        </div>
    </div>

</body>

</html>
